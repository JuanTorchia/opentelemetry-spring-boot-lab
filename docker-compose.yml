services:
  postgres:
    image: postgres:16
    container_name: otel-lab-postgres
    environment:
      POSTGRES_DB: otel_lab
      POSTGRES_USER: otel
      POSTGRES_PASSWORD: otel
    ports:
      - "65432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otel -d otel_lab"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - otel_lab_postgres:/var/lib/postgresql/data

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: otel-lab-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

volumes:
  otel_lab_postgres:
